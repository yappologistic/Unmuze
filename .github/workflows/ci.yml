name: Release readiness

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  readiness:
    name: Tests, builds, and release config
    runs-on: ubuntu-22.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run frontend tests
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Check version alignment
        run: npm run check:versions

      - name: Check updater artifact readiness
        run: npm run check:updater

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test
