name: Platform smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "23 10 * * *"
  pull_request:
    paths:
      - ".github/workflows/**"
      - "eslint.config.js"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "public/**"
      - "scripts/**"
      - "src/**"
      - "src-tauri/**"
      - "vite.config.ts"
      - "vitest.config.ts"
      - "vitest.setup.ts"
      - "tsconfig*.json"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - "eslint.config.js"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "public/**"
      - "scripts/**"
      - "src/**"
      - "src-tauri/**"
      - "vite.config.ts"
      - "vitest.config.ts"
      - "vitest.setup.ts"
      - "tsconfig*.json"

permissions:
  contents: read

concurrency:
  group: platform-smoke-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            runner: ubuntu-22.04
          - name: Windows
            runner: windows-latest
          - name: macOS Apple Silicon
            runner: macos-latest

    env:
      CARGO_TERM_COLOR: always
      CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run frontend tests
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Check version alignment
        run: npm run check:versions

      - name: Check updater artifact readiness
        run: npm run check:updater

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test

  macos-intel:
    name: macOS Intel
    if: github.event_name != 'pull_request'
    runs-on: macos-15-intel
    timeout-minutes: 45

    env:
      CARGO_TERM_COLOR: always
      CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run frontend tests
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Check version alignment
        run: npm run check:versions

      - name: Check updater artifact readiness
        run: npm run check:updater

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test
